<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="theme-color" content="#E8E2DA" />
	<meta name="color-scheme" content="light" />
	<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<!-- Static form for Netlify Forms build-time detection. Hidden from users. -->
	<form name="booking" netlify netlify-honeypot="bot-field" hidden>
		<input type="text" name="name" />
		<input type="email" name="email" />
		<input type="text" name="event-type" />
		<textarea name="message"></textarea>
	</form>
	<div style="display: contents">%sveltekit.body%</div>

	<!--
		Netlify Identity widget. Catches the invite/recovery token in the URL hash
		(e.g. taylorjamesmusic.com/#invite_token=...) and shows the modal so the
		editor can set their password. After login, redirect to /admin.
	-->
	<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
	<script>
		if (window.netlifyIdentity) {
			window.netlifyIdentity.on('init', (user) => {
				if (!user) {
					window.netlifyIdentity.on('login', () => {
						document.location.href = '/admin/';
					});
				}
			});
		}
	</script>
</body>

</html>
